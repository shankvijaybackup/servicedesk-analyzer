name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e ".[ui,dev]"
      - run: python -m pytest -q
      - run: python -m compileall -q sda
